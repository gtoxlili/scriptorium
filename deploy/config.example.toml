# scriptorium example configuration.
# Copy to deploy/config.toml (or pass an explicit path via --config) and edit.

[server]
listen = "127.0.0.1:50051"

[docker]
# Path to the Docker daemon's Unix socket, as seen by the scriptorium
# process itself (not necessarily the host).
#
#   Native run (launchd / cargo run) on macOS with OrbStack:
#       socket = "/Users/influo/.orbstack/run/docker.sock"
#   Native run with Docker Desktop:
#       socket = "/var/run/docker.sock"
#   Inside a container via docker-compose.yml:
#       socket = "/var/run/docker.sock"   # host socket mounted to this path
socket = "/var/run/docker.sock"
control_timeout_seconds = 60

[sandbox]
# Image tag is pinned by convention. Build it from docker/sandbox.Dockerfile.
default_image = "scriptorium-sandbox:debian13-v1"
default_timeout_seconds = 300
default_cpu_millis = 4000                        # 4 cores
default_memory_bytes = 8589934592                # 8 GiB
default_pids = 512
default_tmpfs_bytes = 2147483648                 # 2 GiB
agent_uid = 1000
agent_gid = 1000
workspace_mount = "/home/agent"

[workspace]
# Where per-workspace persistent state lives. When running in Docker,
# this MUST be the same absolute path on host and in the container
# (see docker-compose.yml's bind-mount line) so Docker-resolved bind
# paths into sandbox containers are valid.
root = "/Volumes/external/scriptorium-state"

[tos]
# S3-compatible object storage. Defaults target Volcano Engine TOS; set
# endpoint + region for the region you actually use. Credentials come from
# the file or (preferred) from env vars the deployer expands into this TOML.
endpoint                   = "https://tos-s3-cn-shanghai.volces.com"
region                     = "cn-shanghai"
bucket                     = "your-bucket"
access_key                 = "${TOS_ACCESS_KEY}"
secret_key                 = "${TOS_SECRET_KEY}"
key_prefix                 = "sandbox/"
signed_url_expires_seconds = 3600      # 1 h default for `deliver` URLs
signed_url_max_seconds     = 86400     # clamp hard to 24 h
part_size_bytes            = 8388608   # 8 MiB
upload_timeout_seconds     = 300

[concurrency]
# Hard cap on simultaneously running exec containers. Requests beyond this
# queue for at most `exec_queue_timeout_seconds` then return
# RESOURCE_EXHAUSTED. 0 on either field uses server defaults (4 / 30 s).
max_concurrent_execs       = 4
exec_queue_timeout_seconds = 30

[fetch]
# URL-ingress controls for `FetchIntoWorkspace`. Private CIDRs and loopback
# are rejected by default as basic SSRF defence.
timeout_seconds       = 60
max_body_bytes        = 1073741824  # 1 GiB
allow_private_network = false
