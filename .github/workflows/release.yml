name: Release

# Strategy: push to main triggers a check of Cargo.toml's `version`.
# If a release for that version does not yet exist, build binaries for four
# targets and publish a GitHub Release. Normal commits (no version bump) are
# detected in the first job and the pipeline short-circuits within seconds.
#
# The `version` field in Cargo.toml is the single source of truth — there is
# no manual tagging. Bumping the version in a commit is what ships a release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # create the Release and its tag

env:
  CARGO_TERM_COLOR: always
  # Mirror CI strictness so a release cannot slip through a lint regression.
  RUSTFLAGS: -D warnings

jobs:
  detect:
    name: Detect pending release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - id: read
        name: Read Cargo.toml version
        run: |
          set -euo pipefail
          version=$(awk -F '"' '/^version *=/ {print $2; exit}' Cargo.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Cargo.toml version: $version"

      - id: decide
        name: Release v$version already published?
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.read.outputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::notice::release $tag already exists — nothing to do"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::release $tag not yet published — will build and publish"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            runner: macos-latest
          # x86_64-apple-darwin (Intel Mac) dropped — GitHub's macos-13
          # runner pool is heavily congested and the service is realistically
          # only deployed on arm64 Linux / Apple Silicon in 2026.
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball and SHA-256 sum
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.detect.outputs.tag }}"
          name="scriptorium-${tag}-${{ matrix.target }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/scriptorium" "$name/"
          cp README.md LICENSE "$name/"
          tar -czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            scriptorium-*.tar.gz
            scriptorium-*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [detect, build]
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for auto-generated notes

      - uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: artifacts
          merge-multiple: true

      - name: softprops/action-gh-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: ${{ needs.detect.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/scriptorium-*.tar.gz
            artifacts/scriptorium-*.sha256
          generate_release_notes: true
          draft: false
          # Treat versions like 1.0.0-rc1 as prereleases.
          prerelease: ${{ contains(needs.detect.outputs.version, '-') }}
