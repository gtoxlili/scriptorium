<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!--
  Emoji fallback for the sandbox image.

  Debian's fonts-noto-color-emoji package installs the font but does NOT
  ship a fontconfig snippet that adds it to the generic family fallback
  chains (Arch/Fedora do). On top of that, DejaVu Sans claims to cover
  U+1F600 and U+2764 in its cmap with empty outline placeholders, so any
  renderer that trusts fontconfig coverage (Pango/Cairo → WeasyPrint,
  ImageMagick, etc.) picks DejaVu and never falls through to an emoji
  font. Chromium has its own emoji-font detection and is unaffected.

  We promote Noto Color Emoji (CBDT, bitmap) to the front for renderers
  that can handle color fonts, and Symbola (TrueType outline) right
  behind it for renderers that cannot embed CBDT in their output —
  notably WeasyPrint, matplotlib, and Pillow. Pango/HarfBuzz does
  per-glyph fallback, so non-emoji codepoints (Latin, CJK) still resolve
  to DejaVu / Noto CJK further down the chain.
-->
<fontconfig>
  <alias binding="strong">
    <family>sans-serif</family>
    <prefer>
      <family>Noto Color Emoji</family>
      <family>Symbola</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>serif</family>
    <prefer>
      <family>Noto Color Emoji</family>
      <family>Symbola</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>monospace</family>
    <prefer>
      <family>Noto Color Emoji</family>
      <family>Symbola</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
      <family>Symbola</family>
    </prefer>
  </alias>
</fontconfig>
