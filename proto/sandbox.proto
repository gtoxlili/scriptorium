syntax = "proto3";

package scriptorium.v1;

// Sandbox is the public gRPC surface of the scriptorium service.
// It spawns ephemeral, isolated containers for LLM-driven code execution
// and RPA workloads. Each call spins up a fresh container; persistent
// state lives in an on-disk workspace keyed by an opaque caller-provided
// identifier.
//
// Data flow philosophy: scriptorium is *not* a file transfer proxy.
// Inputs come into the workspace via HTTP (`FetchIntoWorkspace`), outputs
// are delivered via object storage (`UploadToOSS`). Callers never shuttle
// raw bytes through gRPC — they move URLs.
service Sandbox {
  // ─── Core exec ─────────────────────────────────────────────────────────
  rpc Exec(ExecRequest) returns (ExecResponse);
  rpc ExecStream(ExecRequest) returns (stream ExecEvent);

  // ─── Workspace I/O (URL-based) ─────────────────────────────────────────
  // FetchIntoWorkspace downloads an HTTP(S) URL directly into a workspace
  // path. Host-side reqwest; SSRF-guarded against loopback / private CIDRs.
  rpc FetchIntoWorkspace(FetchRequest) returns (FetchResponse);

  // UploadToOSS packages a workspace path (file or directory) and uploads
  // it to the configured object store. Returns a signed download URL that
  // the caller can hand to the end user as a delivery artifact.
  rpc UploadToOSS(UploadRequest) returns (UploadResponse);

  // ListFiles enumerates a workspace directory. Helpful for LLMs that
  // want to pick artifacts to deliver.
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);

  // ─── Lifecycle ─────────────────────────────────────────────────────────
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
  rpc Health(HealthRequest) returns (HealthResponse);

  // ─── AI-facing tool layer ──────────────────────────────────────────────
  // ListTools advertises a compact, LLM-ready tool catalog (name,
  // description, JSON Schema parameters). Callers that already wrap the
  // primitives above can ignore it.
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);

  // CallTool dispatches a named tool against a workspace. Thin convenience
  // layer over the primitives; streaming-heavy flows should use
  // `ExecStream` directly.
  rpc CallTool(CallToolRequest) returns (CallToolResponse);
}

// ─── Exec ──────────────────────────────────────────────────────────────────

message ExecRequest {
  // Opaque caller-defined workspace identifier (e.g. a chat session id).
  // Must match [A-Za-z0-9_-]+, max 128 chars.
  string workspace_id = 1;

  // Tenant identifier — used for audit logging and OSS key namespacing.
  string tenant_id = 2;

  // Shell command to execute inside the container, via `bash -lc`.
  string command = 3;

  // Hard wall-clock timeout in seconds. 0 means "server default".
  uint32 timeout_seconds = 4;

  // Additional environment variables to inject.
  map<string, string> env = 5;

  // Optional image override. Empty = server default.
  string image = 6;

  // Optional resource limits override.
  ResourceLimits limits = 7;
}

message ResourceLimits {
  uint32 cpu_millis = 1;      // e.g., 4000 = 4 cores
  uint64 memory_bytes = 2;    // hard cap
  uint32 pids = 3;            // --pids-limit
  uint64 tmpfs_bytes = 4;     // writable /tmp size
}

message ExecResponse {
  int32 exit_code = 1;
  bytes stdout = 2;
  bytes stderr = 3;
  uint64 duration_ms = 4;
  bool timed_out = 5;
}

message ExecEvent {
  oneof event {
    ExecStarted started = 1;
    StdoutChunk stdout = 2;
    StderrChunk stderr = 3;
    ExecFinished finished = 4;
  }
}
message ExecStarted { string container_id = 1; }
message StdoutChunk { bytes data = 1; }
message StderrChunk { bytes data = 1; }
message ExecFinished {
  int32 exit_code = 1;
  uint64 duration_ms = 2;
  bool timed_out = 3;
}

// ─── Fetch / Upload / List ─────────────────────────────────────────────────

message FetchRequest {
  string workspace_id = 1;
  string tenant_id = 2;
  // HTTP(S) URL. Loopback/private CIDRs are rejected unless explicitly
  // allowlisted in server config.
  string url = 3;
  // Path relative to the workspace root. Parent dirs are created as needed.
  string target_path = 4;
  // Optional headers (auth, UA overrides, etc.).
  map<string, string> headers = 5;
  // Wall-clock timeout for the whole fetch. 0 = server default.
  uint32 timeout_seconds = 6;
}
message FetchResponse {
  uint64 bytes_written = 1;
  string content_type = 2;
  int32 http_status = 3;
}

message UploadRequest {
  string workspace_id = 1;
  string tenant_id = 2;
  // Workspace-relative path. Directories are tar.gz'd automatically; files
  // are uploaded as-is unless `compress = true`.
  string source_path = 3;
  bool compress = 4;
  // Optional human-readable label stored as object metadata.
  string label = 6;
  reserved 5;  // previously `ttl_seconds` for signed-URL TTL
}
message UploadResponse {
  // Full bucket-relative object key. This is the *permanent* handle the
  // caller must persist. Callers resolve it to a user-facing URL via
  // their own attachment system — scriptorium deliberately does not
  // return a signed URL because a TTL-bound link is a footgun for
  // artifacts the user expects to revisit days later.
  string object_key = 2;
  uint64 size_bytes = 3;
  string content_type = 4;
  string sha256_hex = 5;
  // Basename of the uploaded artifact (post-packaging) — handy when the
  // caller is registering this as an attachment row.
  string basename = 6;
  reserved 1;  // previously `url` for signed download URL
}

message ListFilesRequest {
  string workspace_id = 1;
  // Directory within the workspace to list; empty = workspace root.
  string path = 2;
  bool recursive = 3;
}
message FileInfo {
  string path = 1;        // relative to workspace root
  uint64 size_bytes = 2;
  uint32 mode = 3;
  bool is_dir = 4;
  int64 modified_unix = 5;
}
message ListFilesResponse {
  repeated FileInfo files = 1;
}

message DeleteWorkspaceRequest {
  string workspace_id = 1;
}
message DeleteWorkspaceResponse {
  bool existed = 1;
}

// ─── Health ────────────────────────────────────────────────────────────────

message HealthRequest {}
message HealthResponse {
  string version = 1;
  string docker_version = 2;
  bool docker_reachable = 3;
  // Available permits in the exec concurrency semaphore.
  uint32 exec_permits_available = 4;
}

// ─── AI-facing tool layer ──────────────────────────────────────────────────

message ListToolsRequest {}
message ListToolsResponse {
  repeated ToolDescriptor tools = 1;
}

message ToolDescriptor {
  // Stable tool identifier (e.g. "execute_shell"). LLM callers route on this.
  string name = 1;
  // Prose description, LLM-facing.
  string description = 2;
  // JSON Schema for arguments (as a JSON string). Compatible with the
  // OpenAI function-call / MCP tool-descriptor shape.
  string parameters_schema = 3;
}

message CallToolRequest {
  string workspace_id = 1;
  string tenant_id = 2;
  string tool_name = 3;
  // Tool arguments as a JSON object (string-encoded to avoid dragging a
  // Struct dependency into the proto).
  string arguments_json = 4;
  // Optional per-call timeout override.
  uint32 timeout_seconds = 5;
}
message CallToolResponse {
  // Tool result as a JSON object. Shape depends on the tool — see the
  // descriptor returned by ListTools.
  string result_json = 1;
  bool is_error = 2;
  // Populated when `is_error = true`; plain-text error suitable for LLM.
  string error_message = 3;
}
