name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write  # needed to create a GitHub Release

env:
  CARGO_TERM_COLOR: always
  # Mirror CI strictness so a release cannot slip through a lint regression.
  RUSTFLAGS: -D warnings

jobs:
  verify:
    name: Verify tag / Cargo.toml alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve target tag and assert it matches Cargo.toml version
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          tag="${tag#v}"
          cargo_ver=$(awk -F '"' '/^version *=/ {print $2; exit}' Cargo.toml)
          echo "tag=$tag"
          echo "cargo=$cargo_ver"
          if [[ "$tag" != "$cargo_ver" ]]; then
            echo "::error::tag '$tag' does not match Cargo.toml version '$cargo_ver'"
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball and SHA-256 sum
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag || github.ref_name }}"
          name="scriptorium-${tag}-${{ matrix.target }}"
          mkdir -p "$name"
          cp "target/${{ matrix.target }}/release/scriptorium" "$name/"
          cp README.md LICENSE "$name/"
          tar -czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: |
            scriptorium-*.tar.gz
            scriptorium-*.sha256
          if-no-files-found: error

  publish-crate:
    name: Publish to crates.io
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is not set. Add it under Repository Settings → Secrets and variables → Actions."
            exit 1
          fi
          cargo publish --locked

  release:
    name: Publish GitHub Release
    needs: [build, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0  # full history for auto-generated notes

      - uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: artifacts
          merge-multiple: true

      - name: softprops/action-gh-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/scriptorium-*.tar.gz
            artifacts/scriptorium-*.sha256
          generate_release_notes: true
          draft: false
          # Treat tags like v1.0.0-rc1 as prereleases.
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
